name: Publish Package

on:
  push:
    branches:
      - "main"
    paths:
      - "packages/neuromorph/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @kayvanshah1/neuromorph build

      - name: Set publish version
        working-directory: packages/neuromorph
        run: pnpm pkg set version 0.1.${{ github.run_number }}

      - name: Create git tag and push
        run: |
          set -euo pipefail
          VERSION="0.1.${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/neuromorph/package.json
          if git diff --cached --quiet; then
            echo "No version change detected; skipping commit/tag."
            exit 0
          fi
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main --tags

      - run:
          pnpm --filter @kayvanshah1/neuromorph publish --provenance --access
          public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
