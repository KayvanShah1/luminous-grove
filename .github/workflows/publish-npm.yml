name: Publish Package

on:
  push:
    branches:
      - "main"
    paths:
      - "packages/neuromorph/**"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @kayvanshah1/neuromorph build

      - name: Set publish version
        working-directory: packages/neuromorph
        run: pnpm version 0.1.${{ github.run_number }} --no-git-tag-version

      - run: pnpm --filter @kayvanshah1/neuromorph publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
