<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Neuromorph Icon</title>
  <desc id="desc">A glowing neural tree icon.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08131b" />
      <stop offset="100%" stop-color="#0b0f13" />
    </linearGradient>
    <linearGradient id="trunk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b7ffe2" />
      <stop offset="100%" stop-color="#2ce6b0" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)" />
  <g filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 400 C256 360 252 325 246 295 C240 260 232 225 220 200" stroke="url(#trunk)" stroke-width="16" fill="none" />
    <path d="M220 200 C200 175 170 155 140 140" stroke="#6ef5ca" stroke-width="10" fill="none" />
    <path d="M220 200 C245 175 275 155 315 140" stroke="#6ef5ca" stroke-width="10" fill="none" />
    <path d="M246 270 C220 250 190 235 160 230" stroke="#5bf0c6" stroke-width="8" fill="none" />
    <path d="M262 270 C288 250 322 235 356 230" stroke="#5bf0c6" stroke-width="8" fill="none" />
  </g>
  <g fill="#8ff8d7">
    <circle cx="140" cy="140" r="8" />
    <circle cx="160" cy="230" r="6" />
    <circle cx="315" cy="140" r="8" />
    <circle cx="356" cy="230" r="6" />
  </g>
</svg>
